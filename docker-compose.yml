# Family CFO home-server stack.
#
#   docker compose up -d
#
# Brings up the core services (db, api, worker, web) AND the local AI runtime
# (vLLM), which is on by default — this stack assumes a GPU-capable host. To run
# without AI, set FAMILY_CFO_AI_ENABLED=false in .env and stop the vllm service
# (docker compose up -d --scale vllm=0). The vector store (Qdrant) stays behind
# a Compose profile and off by default — see docker/README.md.
#
# Configuration and secrets come from a .env file (see .env.example); nothing
# secret is baked into an image or this file.
name: family-cfo

x-api-env: &api-env
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER:-family_cfo}
  FAMILY_CFO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-family_cfo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-family_cfo}
  FAMILY_CFO_IMPORT_STAGING_DIR: /data/import-staging
  FAMILY_CFO_BACKUP_DIR: /data/backups
  FAMILY_CFO_BACKUP_RETENTION_COUNT: ${FAMILY_CFO_BACKUP_RETENTION_COUNT:-7}
  FAMILY_CFO_BACKUP_ENCRYPTION_KEY: ${FAMILY_CFO_BACKUP_ENCRYPTION_KEY:-}
  FAMILY_CFO_LOG_LEVEL: ${FAMILY_CFO_LOG_LEVEL:-INFO}
  FAMILY_CFO_TLS_CERT_PATH: /etc/family-cfo/certs/tls.crt
  # AI runtime on by default; households inherit this until they save their own
  # ai_runtime_configs row. Must match the vllm service (model = VLLM_MODEL).
  FAMILY_CFO_AI_ENABLED: ${FAMILY_CFO_AI_ENABLED:-true}
  FAMILY_CFO_AI_PROVIDER: vllm
  FAMILY_CFO_AI_BASE_URL: http://vllm:8000
  FAMILY_CFO_AI_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-32B-Instruct}
  # Vision routing (ADR 0011): set SUPPORTS_VISION=true if VLLM_MODEL itself is
  # a vision model (e.g. Qwen2.5-VL); otherwise the vllm-vision describer below
  # analyzes chat photo attachments.
  FAMILY_CFO_AI_SUPPORTS_VISION: ${FAMILY_CFO_AI_SUPPORTS_VISION:-false}
  FAMILY_CFO_AI_VISION_ENABLED: ${FAMILY_CFO_AI_VISION_ENABLED:-true}
  FAMILY_CFO_AI_VISION_BASE_URL: http://vllm-vision:8000
  FAMILY_CFO_AI_VISION_MODEL: ${VLLM_VISION_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
  # Hardware planning (ADR 0012): GPU memory if known; blank on unified-memory hosts.
  FAMILY_CFO_GPU_MEMORY_GB: ${FAMILY_CFO_GPU_MEMORY_GB:-}
  # One-click model apply (ADR 0013); blank disables the in-app Apply button.
  FAMILY_CFO_MODEL_MANAGER_URL: http://model-manager:8000
  # Live-data chat tools (ADR 0014; search on by default since M28).
  FAMILY_CFO_LIVE_DATA_ENABLED: ${FAMILY_CFO_LIVE_DATA_ENABLED:-true}
  FAMILY_CFO_SEARXNG_URL: ${FAMILY_CFO_SEARXNG_URL-http://searxng:8080}
  # Vector retrieval (M69, ADR 0017); empty disables indexing + the
  # search_records chat tool.
  FAMILY_CFO_QDRANT_URL: ${FAMILY_CFO_QDRANT_URL-http://qdrant:6333}
  # M87a (ADR 0018): on-box Kokoro TTS for advisor voice. Empty disables the
  # /voice/tts endpoint (clients fall back to the platform's own voice).
  FAMILY_CFO_TTS_URL: ${FAMILY_CFO_TTS_URL-http://tts:8880}

services:
  db:
    # Pinned to 17 to match the postgresql-client (pg_dump/pg_restore) major
    # version in the API image (Debian trixie ships client 17). The versions
    # must match: a newer pg_dump emits GUCs (e.g. transaction_timeout) an older
    # server rejects on restore, and pg_dump refuses to dump a newer server.
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-family_cfo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-family_cfo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-family_cfo}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment: *api-env
    volumes:
      - import_staging:/data/import-staging
      - backups:/data/backups
      # M98: expose host mounts (e.g. a Synology share mounted under /mnt) so
      # off-box backups can be written to them. rslave propagates mounts made on
      # the host after the container starts.
      - type: bind
        source: /mnt
        target: /mnt
        bind:
          propagation: rslave
      # M69: fastembed's ONNX model cache (downloaded once, ~130 MB).
      - embedding_cache:/root/.cache
      # M83a: read the web tier's TLS cert so pairing QR codes can carry its
      # SHA-256 fingerprint for the iOS app to pin.
      - web_certs:/etc/family-cfo/certs:ro
    depends_on:
      db:
        condition: service_healthy
      # Start order only (vLLM has a long model-load warmup and no healthcheck);
      # the API tolerates an unreachable runtime and falls back deterministically.
      vllm:
        condition: service_started
    networks: [internal]
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["/usr/local/bin/entrypoint-worker.sh"]
    environment: *api-env
    volumes:
      - import_staging:/data/import-staging
      - backups:/data/backups
      # M98: expose host mounts (e.g. a Synology share mounted under /mnt) so
      # off-box backups can be written to them. rslave propagates mounts made on
      # the host after the container starts.
      - type: bind
        source: /mnt
        target: /mnt
        bind:
          propagation: rslave
      # M69: shared with the api so the model downloads once.
      - embedding_cache:/root/.cache
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      # HTTP (redirects to HTTPS) and HTTPS. The dashboard is at
      # https://localhost:${WEB_TLS_PORT}.
      - "${WEB_PORT:-8080}:80"
      - "${WEB_TLS_PORT:-8443}:443"
    environment:
      TLS_CERT_CN: ${TLS_CERT_CN:-family-cfo.local}
      # Comma-separated extra hostnames/IPs the box is reached by, added to the
      # cert's Subject Alternative Names. REQUIRED for iOS/Safari (and the
      # over-the-air app install) when connecting by LAN IP — a cert without the
      # connection host in its SAN is rejected no matter how it is trusted. e.g.
      # TLS_CERT_SAN=192.168.1.10,family-cfo-box
      TLS_CERT_SAN: ${TLS_CERT_SAN:-}
    volumes:
      # Bring-your-own certificate: mount a directory with tls.crt / tls.key to
      # replace the self-signed default (see ADR 0008). Uses a named volume by
      # default so the generated self-signed cert persists across restarts.
      - web_certs:/etc/nginx/certs
      # Signed iOS builds for over-the-air install (M95). A named volume so a
      # build survives `patch.sh web`, and so nothing about the app binary ever
      # lands in the repo.
      - ios_ota:/usr/share/nginx/html/ota
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  # Local LLM runtime, ON BY DEFAULT — this stack assumes a GPU-capable host and
  # the app is wired to use it out of the box (FAMILY_CFO_AI_* on the api/worker).
  # Needs a GPU and a multi-GB model download. To run without it, stop this
  # service (docker compose up -d --scale vllm=0) and set FAMILY_CFO_AI_ENABLED
  # =false. Never published to the host.
  vllm:
    image: vllm/vllm-openai:latest
    # --enable-auto-tool-choice + --tool-call-parser are REQUIRED for the M16
    # agentic advisor: without them vLLM never emits OpenAI tool_calls, so the
    # tool-calling loop can't ground any numbers and every chat silently falls
    # back to the deterministic snapshot. The parser must match the model
    # family (hermes for Qwen2.5, llama3_json for Llama 3.x).
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-32B-Instruct}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "${VLLM_TOOL_PARSER:-hermes}"
      # Fraction of GPU memory this instance may claim — must leave room for
      # the vllm-vision describer below (ADR 0011).
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_FRACTION:-0.60}"
      # Cap the context window: models shipping 128k defaults (e.g. VL-72B)
      # need ~39 GiB of KV cache at full length and crash-loop on startup.
      # 32k is ample for chat + tool calls and keeps KV under ~10 GiB.
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
    environment:
      # Only needed for gated models (e.g. Llama). Ungated defaults ignore it.
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      # DeepGEMM's FP8 block-quant path asserts ("Unknown SF transformation")
      # on GB10-class hardware; the fallback FP8 kernels work. Override to 1
      # on platforms where DeepGEMM is known-good.
      VLLM_USE_DEEP_GEMM: ${VLLM_USE_DEEP_GEMM:-0}
    volumes:
      - model_cache:/root/.cache/huggingface
    networks: [internal]
    restart: unless-stopped
    # vLLM needs host IPC (shared memory) for its tensor-parallel workers.
    ipc: host
    # Pass the host GPU(s) into the container. Requires the NVIDIA Container
    # Toolkit on the host (nvidia-ctk). Without this block vLLM cannot see the
    # GPU and will fail to start.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Small vision describer for chat photo attachments (ADR 0011). Turns a photo
  # into a text description the main model reasons over. Run GPU-light: no tool
  # parsing needed. Opt out with FAMILY_CFO_AI_VISION_ENABLED=false and
  # `--scale vllm-vision=0` (photos then get a graceful "not analyzed" warning).
  vllm-vision:
    image: vllm/vllm-openai:latest
    command:
      - "--model"
      - "${VLLM_VISION_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}"
      - "--gpu-memory-utilization"
      - "${VLLM_VISION_GPU_FRACTION:-0.20}"
      - "--max-model-len"
      - "8192"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      # Same GB10-class DeepGEMM FP8 assert as the main service (M55/M66):
      # "Unknown SF transformation" at weight post-processing. Fallback FP8
      # kernels work; override to 1 where DeepGEMM is known-good.
      VLLM_USE_DEEP_GEMM: ${VLLM_USE_DEEP_GEMM:-0}
    volumes:
      - model_cache:/root/.cache/huggingface
    networks: [internal]
    restart: unless-stopped
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # THE one privileged sidecar (ADR 0013): swaps served models on request from
  # the API (owner-gated) by running scripts/swap-model.sh. Docker socket +
  # project mount; strict repo-id validation; one operation only. Internal
  # network, never published. Remove with --scale model-manager=0 to fall back
  # to the command-line swap flow.
  model-manager:
    build:
      context: services/model-manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
    networks: [internal]
    restart: unless-stopped

  # Self-hosted metasearch for the chat web_search tool (ADR 0014, on by
  # default since M28 so live price lookups work out of the box). Queries carry
  # only the model-composed item terms — never household data. Opt out with
  # FAMILY_CFO_SEARXNG_URL= (empty) and --scale searxng=0.
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-family-cfo-searxng-secret}
    volumes:
      - ./docker/searxng-settings.yml:/etc/searxng/settings.yml:ro
    networks: [internal]
    restart: unless-stopped

  # Monitoring (M67): ops metrics only — no household financial data flows
  # through this stack. On by default (turnkey, like search); remove with
  # `--scale prometheus=0 --scale grafana=0 --scale node-exporter=0`.
  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [internal]
    restart: unless-stopped

  # Host CPU/memory/disk. On unified-memory hosts (GB10-class) host memory IS
  # the GPU memory, so this doubles as GPU monitoring without a DCGM exporter.
  node-exporter:
    image: prom/node-exporter:latest
    command: ["--path.rootfs=/host"]
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [internal]
    restart: unless-stopped

  # Ops dashboards, reached through the app's own HTTPS address at
  # https://<server>:${WEB_TLS_PORT}/grafana/ (nginx proxies; no extra
  # published port — iPhone Safari's HTTPS-first breaks on plain-HTTP ports).
  # Anonymous viewing is enabled because only ops telemetry lives here; the
  # admin password (for editing) comes from .env.
  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SERVER_ROOT_URL: "https://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-family-cfo-grafana}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: system
      # Land straight on the ops dashboard instead of Grafana's welcome page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/family-cfo.json
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [internal]
    restart: unless-stopped

  # Vector store for semantic recall over the household's own records (M69,
  # ADR 0017). Rebuildable from PostgreSQL (worker re-indexes at startup and
  # daily), so backups exclude it. Opt out with FAMILY_CFO_QDRANT_URL= (empty)
  # and --scale qdrant=0.
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [internal]
    restart: unless-stopped

  # On-box neural TTS for the advisor's voice (M87a, ADR 0018). Kokoro-82M
  # behind an OpenAI-compatible /v1/audio/speech API; CPU-only so it never
  # contends with the chat/vision GPUs. Multi-arch (amd64 + arm64), model
  # baked in. Opt out with FAMILY_CFO_TTS_URL= (empty) and --scale tts=0.
  tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    networks: [internal]
    restart: unless-stopped

volumes:
  postgres_data:
  ios_ota:
  import_staging:
  backups:
  model_cache:
  qdrant_data:
  web_certs:
  prometheus_data:
  grafana_data:
  embedding_cache:

networks:
  internal:
    driver: bridge

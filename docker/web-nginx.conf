# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the dashboard.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'" always;

    # Over-the-air iOS install (M95). Xcode's wireless deploy discovers the phone
    # with Bonjour/mDNS, which is multicast and therefore cannot cross a routed
    # WireGuard tunnel — so away from home the phone is undeployable, even though
    # it can reach this box perfectly well. This serves a signed .ipa + manifest
    # so the phone installs over the SAME path it already uses to talk to us.
    #
    # The manifest MUST be reachable over HTTPS or iOS refuses the install, hence
    # it lives here rather than on some ad-hoc port.
    location /ota/ {
        # The app's strict CSP is meant for the dashboard; a location-level
        # add_header cancels every inherited one, so re-add what still applies.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;

        # iOS is strict about these: the wrong type on either file and the
        # install silently does nothing.
        types {
            application/octet-stream ipa;
            application/xml          plist;
            application/x-x509-ca-cert crt;
            image/png                png;
        }
        default_type application/octet-stream;

        autoindex off;
        # No SPA fallback here: a missing build must 404, not quietly serve the
        # dashboard's index.html to a phone that is trying to install an app.
        try_files $uri =404;
    }

    # Proxy API calls to the API container on the private Docker network.
    # Resolve the `api` host at request time via Docker's embedded DNS (127.0.0.11)
    # and via a variable, so nginx starts even if the API is momentarily down and
    # picks up the API's new address if its container restarts.
    location /api/ {
        # Cap request bodies at the web tier (defense in depth alongside the
        # API's own FAMILY_CFO_MAX_UPLOAD_BYTES). Raise both if larger imports
        # are needed.
        client_max_body_size 12m;
        # Agentic chat requests can run several model+tool rounds; the nginx
        # default (60s) cut them off mid-flight (M28).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # $http_host keeps the client's port (e.g. 192.168.1.10:8443) that
        # $host drops — the pairing QR needs the externally reachable address.
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # M67/M68 follow-up: the Grafana ops dashboards, served under the SAME
    # HTTPS address as the app (iPhone Safari's HTTPS-first silently fails
    # against Grafana's plain-HTTP port). WebSocket headers for live panels.
    location /grafana/ {
        # Grafana's frontend needs inline/eval scripts the app's strict CSP
        # (inherited from the server block) forbids — its boot never finishes.
        # A location-level add_header cancels ALL inherited add_headers, so
        # re-add the safe ones and let Grafana ship its own CSP.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $grafana_upstream http://grafana:3000;
        # serve_from_sub_path=true: Grafana itself serves under /grafana/,
        # so the prefix is passed through unchanged (no rewrite — a stripped
        # prefix makes Grafana 301 to its configured root_url domain).
        proxy_pass $grafana_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    # SPA fallback: unknown routes serve the Angular index so client-side
    # routing works on refresh/deep-link.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

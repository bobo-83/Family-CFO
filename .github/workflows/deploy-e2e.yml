name: Deploy E2E

# M72: the real thing — build the images, boot the core stack (db + api +
# worker + web; no GPU services), and exercise it over HTTP: migrations,
# demo login, a grounded chat answer, and the TLS-served dashboard.
on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'services/**'
      - 'database/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'shared/**'
      - 'scripts/deploy.sh'
      - 'scripts/e2e-deploy-test.sh'
      - '.github/workflows/deploy-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'services/**'
      - 'database/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'shared/**'
      - 'scripts/deploy.sh'
      - 'scripts/e2e-deploy-test.sh'
      - '.github/workflows/deploy-e2e.yml'

jobs:
  build-boot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest has only ~14 GB free and ships toolchains this job
      # never uses; the image builds need the room (first run died with
      # "No space left on device").
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - name: Build, boot, and smoke-test the deployment
        run: scripts/e2e-deploy-test.sh

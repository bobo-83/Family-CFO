name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API and service packages
        run: make install

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit third-party Python dependencies for known vulnerabilities
        # Audit only third-party dependencies. The workspace's own packages
        # (family-cfo-*) are installed editable and are not on PyPI, so
        # pip-audit cannot look them up; excluding them keeps the audit focused
        # on dependencies we don't control.
        run: |
          pip freeze | grep -viE "family[-_]cfo|^-e |@ file://" > /tmp/thirdparty-requirements.txt
          pip-audit -r /tmp/thirdparty-requirements.txt

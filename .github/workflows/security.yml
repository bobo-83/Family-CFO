name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action lists the PR's commits via the API on pull_request events;
    # without these read scopes the default GITHUB_TOKEN gets 403 "Resource not
    # accessible by integration" and the job fails for every PR (it only ever ran
    # on direct pushes to main before, which use a different scan path).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # M121 (ADR 0030): personal identifiers / environment specifics must never
      # be committed — Apple team ids, real private IPs, personal home paths.
      - name: Check repo hygiene (no personal identifiers)
        run: scripts/check-repo-hygiene.sh

  dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API and service packages
        run: make install

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit third-party Python dependencies for known vulnerabilities
        # Audit only third-party dependencies. The workspace's own packages
        # (family-cfo-*) are installed editable and are not on PyPI, so
        # pip-audit cannot look them up; excluding them keeps the audit focused
        # on dependencies we don't control.
        run: |
          pip freeze | grep -viE "family[-_]cfo|^-e |@ file://" > /tmp/thirdparty-requirements.txt
          pip-audit -r /tmp/thirdparty-requirements.txt

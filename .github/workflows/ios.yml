name: iOS App

on:
  pull_request:
    paths:
      - 'apps/ios/**'
      - 'shared/openapi/**'
      - '.github/workflows/ios.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/ios/**'
      - 'shared/openapi/**'
      - '.github/workflows/ios.yml'

jobs:
  build-test:
    # Needs Xcode 26 / the iOS 26 SDK: the M86 voice engine uses SpeechAnalyzer,
    # which does not exist in earlier SDKs, so it is a COMPILE error on older
    # Xcode even though the runtime is gated with `if #available(iOS 26.0, *)`.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Newest Xcode on the runner rather than a pinned version, so this can't
        # silently fall behind the SDK the app requires again.
        run: |
          newest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          echo "Selecting $newest"
          sudo xcode-select -s "$newest"
          xcodebuild -version

      - name: Cache generator build
        uses: actions/cache@v4
        with:
          path: apps/ios/openapi-generator/.build
          key: openapi-generator-${{ runner.os }}-${{ hashFiles('apps/ios/openapi-generator/Package.swift') }}

      - name: Check generated Swift client is up to date with the OpenAPI contract
        run: scripts/generate-swift-client.sh --check

      - name: Build and test (iOS Simulator)
        working-directory: apps/ios/FamilyCFO
        run: |
          # Target an available simulator by UDID, so we don't depend on a device
          # name that changes between SDK versions (iPhone 16 Pro vs 17 Pro …).
          # simctl prints "    iPhone 17 Pro (UDID) (Shutdown)"; split on parens
          # and keep the last iPhone's UDID.
          sim="$(xcrun simctl list devices available \
            | awk -F '[()]' '/iPhone/ { udid = $2 } END { print udid }')"
          echo "Using simulator $sim"
          test -n "$sim" || { echo "No iPhone simulator available"; exit 1; }
          # ADR 0037: the app target is built warnings-as-errors (set on the
          # target in project.pbxproj, NOT here — a command-line override would
          # also treat third-party SwiftPM dependencies' warnings as errors and
          # break their builds).
          xcodebuild test \
            -project FamilyCFO.xcodeproj \
            -scheme FamilyCFO \
            -destination "id=$sim" \
            CODE_SIGNING_ALLOWED=NO

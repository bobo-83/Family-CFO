name: Web Dashboard

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'shared/openapi/**'
      - '.github/workflows/web.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'shared/openapi/**'
      - '.github/workflows/web.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated client is up to date with the OpenAPI contract
        run: |
          npm run generate:client
          git diff --exit-code -- src/app/api-client \
            || (echo "Generated API client is stale — run 'npm run generate:client' and commit." && exit 1)

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
        env:
          CI: "true"

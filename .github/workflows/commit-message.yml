name: Commit Message

# Pull-request only. The convention is enforced on the commits BEFORE they land;
# once merged, main's tip is GitHub's own merge- or squash-commit whose message
# it generates (no required sections, non-conventional subject) — re-validating
# that on push is both redundant and unfixable, and only ever fails.
on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail

          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

          # Skip merge commits an intermediate merge may have pulled into the PR;
          # GitHub generates their message, not authored to the convention.
          git rev-list --reverse --no-merges "$range" | while read -r commit_sha; do
            echo "Validating $commit_sha"
            git log --format=%B -n 1 "$commit_sha" > /tmp/commit-message.txt
            scripts/validate-commit-message.sh /tmp/commit-message.txt
          done

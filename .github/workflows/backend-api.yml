name: Backend API

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            services/financial-engine/pyproject.toml
            services/ai-orchestrator/pyproject.toml

      - name: Install API test dependencies
        run: make install

      - name: Lint API
        run: make lint

      - name: Test API
        run: make test

      - name: Check OpenAPI contract drift
        run: make check-openapi

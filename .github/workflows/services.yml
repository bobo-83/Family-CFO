name: Service Packages

on:
  pull_request:
    paths:
      - 'services/**'
      - 'shared/**'
      - '.github/workflows/services.yml'
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'shared/**'
      - '.github/workflows/services.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - financial-engine
          - ai-orchestrator
          - ocr-worker
          - scheduler
          - backup
          - model-manager
    defaults:
      run:
        working-directory: services/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.package }}/pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest

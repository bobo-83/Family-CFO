<div class="signup">
  <div class="signup__card">
    <h1>Create your household</h1>
    <p class="signup__subtitle">
      Set up the first owner account for this self-hosted instance. You can add family members
      afterwards from the Users page.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="signup__field">
        <span>Household name</span>
        <input type="text" formControlName="displayName" autocomplete="organization" />
        @if (form.controls.displayName.invalid && form.controls.displayName.touched) {
          <span class="signup__error">Enter a household name.</span>
        }
      </label>

      <label class="signup__field">
        <span>Base currency</span>
        <input type="text" formControlName="baseCurrency" maxlength="3" autocomplete="off" />
        @if (form.controls.baseCurrency.invalid && form.controls.baseCurrency.touched) {
          <span class="signup__error">Use a 3-letter currency code (e.g. USD).</span>
        }
      </label>

      <label class="signup__field">
        <span>Your name</span>
        <input type="text" formControlName="ownerDisplayName" autocomplete="name" />
        @if (form.controls.ownerDisplayName.invalid && form.controls.ownerDisplayName.touched) {
          <span class="signup__error">Enter your name.</span>
        }
      </label>

      <label class="signup__field">
        <span>Email</span>
        <input type="email" formControlName="ownerEmail" autocomplete="username" />
        @if (form.controls.ownerEmail.invalid && form.controls.ownerEmail.touched) {
          <span class="signup__error">Enter a valid email address.</span>
        }
      </label>

      <label class="signup__field">
        <span>Password</span>
        <input type="password" formControlName="ownerPassword" autocomplete="new-password" />
        @if (form.controls.ownerPassword.invalid && form.controls.ownerPassword.touched) {
          <span class="signup__error">Password must be at least 8 characters.</span>
        }
      </label>

      @if (errorMessage(); as message) {
        <p class="signup__error signup__error--banner" role="alert">{{ message }}</p>
      }

      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating…' : 'Create household' }}
      </button>
    </form>

    <p class="signup__foot">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>

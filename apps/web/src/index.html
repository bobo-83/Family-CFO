<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Family CFO</title>
    <base href="/" />
    <!-- viewport-fit=cover lets the app extend under the iPhone notch; the
         shell pads with env(safe-area-inset-*) so content stays visible. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <!-- App icon (shared/brand/icon.svg is the master; the iOS app uses the
         same art). SVG for modern browsers, .ico fallback, PNGs for
         home-screen/pinned previews. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

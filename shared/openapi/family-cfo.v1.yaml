openapi: 3.1.0
info:
  title: Family CFO API
  version: 0.1.0
  description: >
    Initial specification for the Family CFO self-hosted backend API.
    This contract is the source of truth for generated Swift and Angular clients.
servers:
  - url: /api/v1
    description: Local Family CFO server
tags:
  - name: Health
  - name: Pairing
  - name: Authentication
  - name: Household
  - name: Accounts
  - name: Transactions
  - name: Bills
  - name: Income
  - name: Goals
  - name: Advisor
  - name: Chat
  - name: Imports
  - name: Reports
  - name: AI Runtime
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /pairing/sessions:
    post:
      tags:
        - Pairing
      operationId: createPairingSession
      summary: Create a short-lived pairing session for a device
      responses:
        "201":
          description: Pairing session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingSession"
  /pairing/confirm:
    post:
      tags:
        - Pairing
      operationId: confirmPairing
      summary: Confirm mobile device pairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingConfirmRequest"
      responses:
        "200":
          description: Device paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCredential"
        "400":
          $ref: "#/components/responses/Error"
  /auth/sessions:
    post:
      tags:
        - Authentication
      operationId: createAuthSession
      summary: Create a local authentication session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionCreateRequest"
      responses:
        "201":
          description: Authentication session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
  /household:
    get:
      tags:
        - Household
      operationId: getHouseholdContext
      summary: Get household financial context summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Household context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdContext"
        "401":
          $ref: "#/components/responses/Error"
  /accounts:
    get:
      tags:
        - Accounts
      operationId: listAccounts
      summary: List accounts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /transactions:
    get:
      tags:
        - Transactions
      operationId: listTransactions
      summary: List transactions for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /bills:
    get:
      tags:
        - Bills
      operationId: listBills
      summary: List recurring bills for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /income:
    get:
      tags:
        - Income
      operationId: listIncomeSources
      summary: List income sources for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Income sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /goals:
    get:
      tags:
        - Goals
      operationId: listGoals
      summary: List financial goals
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Goals
      operationId: createGoal
      summary: Create a financial goal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalCreateRequest"
      responses:
        "201":
          description: Goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /advisor/purchase:
    post:
      tags:
        - Advisor
      operationId: analyzePurchase
      summary: Analyze the financial impact of a potential purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseAdvisorRequest"
      responses:
        "200":
          description: Purchase recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
  /chat/messages:
    post:
      tags:
        - Chat
      operationId: createChatMessage
      summary: Send a message to the financial advisor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /imports:
    get:
      tags:
        - Imports
      operationId: listImports
      summary: List import jobs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Import jobs
          content:
            application/json:
              schema:
                type: object
                required:
                  - imports
                properties:
                  imports:
                    type: array
                    items:
                      $ref: "#/components/schemas/ImportRecord"
    post:
      tags:
        - Imports
      operationId: createImport
      summary: Register a financial data import
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCreateRequest"
      responses:
        "202":
          description: Import accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRecord"
  /reports:
    get:
      tags:
        - Reports
      operationId: listReports
      summary: List generated reports
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReportType"
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: object
                required:
                  - reports
                properties:
                  reports:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportSummary"
  /ai/runtime:
    get:
      tags:
        - AI Runtime
      operationId: getAiRuntimeConfig
      summary: Get active AI runtime configuration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI runtime configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRuntimeConfig"
    put:
      tags:
        - AI Runtime
      operationId: updateAiRuntimeConfig
      summary: Update AI runtime configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRuntimeConfig"
      responses:
        "200":
          description: AI runtime configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRuntimeConfig"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Money:
      type: object
      required:
        - amount_minor
        - currency
      properties:
        amount_minor:
          type: integer
          format: int64
          description: Signed integer amount in minor currency units.
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
    PairingSession:
      type: object
      required:
        - id
        - qr_payload
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        qr_payload:
          type: string
        expires_at:
          type: string
          format: date-time
    PairingConfirmRequest:
      type: object
      required:
        - pairing_session_id
        - device_name
        - device_public_key
      properties:
        pairing_session_id:
          type: string
          format: uuid
        device_name:
          type: string
          maxLength: 120
        device_public_key:
          type: string
    DeviceCredential:
      type: object
      required:
        - device_id
        - access_token
        - expires_at
      properties:
        device_id:
          type: string
          format: uuid
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
    AuthSessionCreateRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    AuthSession:
      type: object
      required:
        - access_token
        - expires_at
        - household_id
        - user_id
        - role
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        household_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/HouseholdRole"
    HouseholdRole:
      type: string
      enum:
        - owner
        - adult
        - viewer
        - child
    RecurringFrequency:
      type: string
      enum:
        - weekly
        - biweekly
        - semimonthly
        - monthly
        - quarterly
        - annual
    Transaction:
      type: object
      required:
        - id
        - account_id
        - occurred_at
        - amount
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        merchant:
          type: string
        category:
          type: string
        description:
          type: string
    Bill:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        account_id:
          type: string
          format: uuid
    IncomeSource:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
    AccountListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    TransactionListResponse:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
    BillListResponse:
      type: object
      required:
        - bills
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
    IncomeListResponse:
      type: object
      required:
        - income
      properties:
        income:
          type: array
          items:
            $ref: "#/components/schemas/IncomeSource"
    GoalListResponse:
      type: object
      required:
        - goals
      properties:
        goals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"
    HouseholdContext:
      type: object
      required:
        - household_id
        - display_name
        - currency
        - net_worth
        - emergency_fund_months
      properties:
        household_id:
          type: string
          format: uuid
        display_name:
          type: string
        currency:
          type: string
          example: USD
        net_worth:
          $ref: "#/components/schemas/Money"
        emergency_fund_months:
          type: number
          format: double
    Account:
      type: object
      required:
        - id
        - name
        - type
        - balance
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        balance:
          $ref: "#/components/schemas/Money"
    AccountType:
      type: string
      enum:
        - checking
        - savings
        - credit_card
        - brokerage
        - retirement
        - hsa
        - 529
        - mortgage
        - auto_loan
        - student_loan
        - real_estate
        - other_asset
        - other_liability
    Goal:
      type: object
      required:
        - id
        - name
        - type
        - target
        - current
        - priority
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/GoalType"
        target:
          $ref: "#/components/schemas/Money"
        current:
          $ref: "#/components/schemas/Money"
        target_date:
          type: string
          format: date
        priority:
          type: integer
          minimum: 1
          maximum: 5
    GoalCreateRequest:
      type: object
      required:
        - name
        - type
        - target
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/GoalType"
        target:
          $ref: "#/components/schemas/Money"
        target_date:
          type: string
          format: date
        priority:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
    GoalType:
      type: string
      enum:
        - emergency_fund
        - vacation
        - retirement
        - college
        - vehicle
        - renovation
        - other
    PurchaseAdvisorRequest:
      type: object
      required:
        - item
        - price
      properties:
        merchant:
          type: string
        item:
          type: string
        description:
          type: string
        price:
          $ref: "#/components/schemas/Money"
        source:
          type: string
          enum:
            - manual
            - mobile_vision
            - receipt
            - product_photo
        confidence:
          type: number
          minimum: 0
          maximum: 1
        user_question:
          type: string
    Recommendation:
      type: object
      required:
        - id
        - answer
        - assumptions
        - impacts
        - tradeoffs
        - alternatives
        - confidence
        - calculation_refs
      properties:
        id:
          type: string
          format: uuid
        answer:
          type: string
        assumptions:
          type: array
          items:
            type: string
        impacts:
          type: array
          items:
            $ref: "#/components/schemas/Impact"
        tradeoffs:
          type: array
          items:
            type: string
        alternatives:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        calculation_refs:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    Impact:
      type: object
      required:
        - area
        - summary
      properties:
        area:
          type: string
          enum:
            - cash_flow
            - emergency_fund
            - debt
            - savings_goal
            - retirement
            - net_worth
            - other
        summary:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
    ChatRequest:
      type: object
      required:
        - message
      properties:
        conversation_id:
          type: string
          format: uuid
        message:
          type: string
    ChatResponse:
      type: object
      required:
        - conversation_id
        - recommendation
      properties:
        conversation_id:
          type: string
          format: uuid
        recommendation:
          $ref: "#/components/schemas/Recommendation"
    ImportCreateRequest:
      type: object
      required:
        - source_type
        - filename
      properties:
        source_type:
          $ref: "#/components/schemas/ImportSourceType"
        filename:
          type: string
        account_id:
          type: string
          format: uuid
    ImportRecord:
      type: object
      required:
        - id
        - source_type
        - filename
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        source_type:
          $ref: "#/components/schemas/ImportSourceType"
        filename:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - needs_review
            - completed
            - failed
        created_at:
          type: string
          format: date-time
    ImportSourceType:
      type: string
      enum:
        - csv
        - pdf
        - ofx
        - qfx
    ReportSummary:
      type: object
      required:
        - id
        - type
        - period_start
        - period_end
        - title
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ReportType"
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        title:
          type: string
    ReportType:
      type: string
      enum:
        - weekly
        - monthly
        - annual
    AiRuntimeConfig:
      type: object
      required:
        - provider
        - base_url
        - model
      properties:
        provider:
          type: string
          enum:
            - vllm
            - ollama
            - llama_cpp
            - openai_compatible
        base_url:
          type: string
          format: uri
        model:
          type: string
        enabled:
          type: boolean
          default: true

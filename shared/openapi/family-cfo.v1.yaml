        - type
        - current
        - target
        - percent_complete
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/GoalType"
        current:
          $ref: "#/components/schemas/Money"
        target:
          $ref: "#/components/schemas/Money"
        percent_complete:
          description: current / target, 0-100 (capped), 0 when target is 0.

    BillListResponse:
      type: object
      required:
        - bills
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
    BillSuggestion:
      type: object
      description: >
        A recurring charge detected in checking/credit-card transactions
        (M58). Deterministic pattern-matching, not an AI guess — every
        suggestion is explainable as "N charges of ~amount at ~cadence".
      required:
        - merchant_key
        - name
        - amount
        - frequency
        - next_due_date
        - occurrences
        - last_seen
      properties:
        merchant_key:
          type: string
          description: Normalized merchant identifier; used to dismiss.
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        occurrences:
          type: integer
        last_seen:
          type: string
          format: date
    BillUpdateSuggestion:
      type: object
      description: >
        An existing bill whose live charge pattern has drifted (M59): the
        detected median amount or cadence no longer matches the stored bill.
        Applying it is always a user-confirmed PATCH — never silent.
      required:
        - bill_id
        - name
        - dismiss_key
        - current_amount
        - suggested_amount
        - frequency
        - next_due_date
        - occurrences
        - last_seen
      properties:
        bill_id:
          type: string
          format: uuid
        name:
          type: string
        dismiss_key:
          type: string
          description: >
            Pass to the dismissal endpoint to mute THIS suggested value; a
            later different value prompts again.
        current_amount:
          $ref: "#/components/schemas/Money"
        suggested_amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        occurrences:
          type: integer
        last_seen:
          type: string
          format: date
    BillSuggestionListResponse:
      type: object
      required:
        - suggestions
        - updates
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/BillSuggestion"
        updates:
          type: array
          items:
            $ref: "#/components/schemas/BillUpdateSuggestion"
    BillSuggestionDismissRequest:
      type: object
      required:
        - merchant_key
      properties:
        merchant_key:
          type: string
          minLength: 1
          maxLength: 120
    Memory:
      type: object
      description: >
        A durable household fact the advisor remembers across conversations
        (M57, ADR 0016). Facts survive conversation deletion by design;
        deleting the memory itself is the forget operation.
      required:
        - id
        - key
        - value
        - source
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Stable identifier; a restated fact updates, not duplicates.
        value:
          type: string
        source:
          type: string
          enum: [chat, manual]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MemoryListResponse:
      type: object
      required:
        - memories
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/Memory"
    MemoryCreateRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          minLength: 1
          maxLength: 500
    IncomeAnalysisTransaction:
      type: object
      required:
        - transaction_id
        - occurred_at
        - amount
        - name
        - excluded
      properties:
        transaction_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        name:
          type: string
        merchant:
          type: string
          description: The payer/sender as the bank reported it.
        description:
          type: string
          description: Full untruncated bank memo (often names the source account).
        account_name:
          type: string
          description: The checking account the deposit landed in.
        excluded:
          type: boolean
    IncomeSourceAnalysis:
      type: object
      description: >
        A recurring deposit pattern detected in checking accounts (M61) with
        every underlying transaction shown as editable evidence.
      required:
        - source_key
        - name
        - frequency
        - manually_added
        - typical_amount
        - total_amount
        - transactions
      properties:
        source_key:
          type: string
        name:
          type: string
        frequency:
          type: string
          description: Detected cadence, or "irregular" for manually-added deposits.
        manually_added:
          type: boolean
        typical_amount:
          $ref: "#/components/schemas/Money"
        total_amount:
          $ref: "#/components/schemas/Money"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/IncomeAnalysisTransaction"
    IncomeRollup:
      type: object
      required:
        - annual_income
        - monthly_average
        - transaction_count
        - window_days
      properties:
        annual_income:
          $ref: "#/components/schemas/Money"
        monthly_average:
          $ref: "#/components/schemas/Money"
        transaction_count:
          type: integer
        window_days:
          type: integer
        coverage_start:
          type: string
          format: date
          description: Earliest synced checking transaction in the window.
        coverage_days:
          type: integer
          description: How many days of history the analysis actually has.
    TaxEstimate:
      type: object
      description: >
        Deterministic US federal + FICA estimate with explicit assumptions
        (standard deduction only, no credits, no state tax). When income is
        treated as take-home, gross is recovered by solving
        gross − tax(gross) = net.
      required:
        - tax_year
        - filing_status
        - income_treated_as_net
        - gross_income
        - standard_deduction
        - taxable_income
        - federal_income_tax
        - fica_tax
        - total_tax
        - effective_rate
        - assumptions
      properties:
        tax_year:
          type: integer
        filing_status:
          type: string
          enum: [single, married_joint, head_of_household]
        income_treated_as_net:
          type: boolean
        gross_income:
          $ref: "#/components/schemas/Money"
        net_income:
          $ref: "#/components/schemas/Money"
        standard_deduction:
          $ref: "#/components/schemas/Money"
        taxable_income:
          $ref: "#/components/schemas/Money"
        federal_income_tax:
          $ref: "#/components/schemas/Money"
        fica_tax:
          $ref: "#/components/schemas/Money"
        total_tax:
          $ref: "#/components/schemas/Money"
        effective_rate:
          type: number
        assumptions:
          type: array
          items:
            type: string
    IncomeAnalysisResponse:
      type: object
      required:
        - sources
        - other_inflows
        - rollup
        - tax
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/IncomeSourceAnalysis"
        other_inflows:
          type: array
          items:
            $ref: "#/components/schemas/IncomeAnalysisTransaction"
        rollup:
          $ref: "#/components/schemas/IncomeRollup"
        coverage_warning:
          type: string
          description: >
            Present when the synced history does not span the full analysis
            window (e.g. it starts mid-year) — income and tax are then likely
            underestimated. Internal transfers between the household's own
            accounts are never shown or counted (M63).
        tax:
          $ref: "#/components/schemas/TaxEstimate"

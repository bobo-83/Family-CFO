        recommendation_id:
          type: string
          format: uuid
        sequence:
          type: integer
        created_at:
          type: string
          format: date-time
    ConversationDetail:
      type: object
      required:
        - id
        - title
        - created_at
        - updated_at
        - messages
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMessage"
    AiRuntimeConfig:
      type: object
      required:
        - provider
        - base_url
        - model
      properties:
        provider:
          type: string
          enum:
            - vllm
            - ollama
            - llama_cpp
            - openai_compatible
        base_url:
          type: string
          format: uri
        model:
          type: string
        enabled:
          type: boolean
          default: true
    AiRuntimeStatus:
      type: object
      required:
        - enabled
        - provider
        - model
        - ready
        - detail
      properties:
        enabled:
          type: boolean
        provider:
          type: string
        model:
          type: string
        ready:
          type: boolean
        served_model:
          type:
            - string
            - "null"
        detail:
          type: string
        vision_ready:
          type: boolean
        vision_model:
          type:
            - string
            - "null"
        vision_enabled:
          type: boolean
        loading_phase:
          description: "M50: what 'loading' actually means, classified from the vLLM log tail."
          type:
            - string
            - "null"
          enum: [downloading, loading, warming_up, error, starting]
        loading_detail:
          description: Human detail (download %, shard %, or the crash line).
          type:
            - string
            - "null"
    AiModelInfo:
      type: object
      required:
        - id
        - label
        - role
        - parameters_b
        - est_memory_gb
        - est_disk_gb
        - supports_vision
        - gated
      properties:
        id:
          type: string
        label:
          type: string
        role:
          type: string
          enum: [main, vision, both]
        parameters_b:
          type: number
        est_memory_gb:
          type: number
        est_disk_gb:
          type: number
        tool_parser:
          type:
            - string
            - "null"
        supports_vision:
          type: boolean
        created_at:
          type: string
          description: >
            Hugging Face release timestamp (M71); absent for curated entries,
            which the picker treats as modern (hand-vetted).
        gated:
          type: boolean
        notes:
          type: string
    AiModelCatalog:
      type: object
      required:
        - models
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/AiModelInfo"
    AiStudyInsight:
      type: object
      required:
        - key
        - value
        - updated_at
      properties:
        key:
          type: string
          description: Stable identifier; re-studying a month updates it in place.
        value:
          type: string
        updated_at:
          type: string
          format: date-time
    AiStudyStatus:
      type: object
      required:
        - total_months
        - studied_months
        - coverage_percent
        - runtime_usable
        - insights
      properties:
        total_months:
          type: integer
          description: Complete calendar months of transaction history.
        studied_months:
          type: integer
        coverage_percent:
          type: integer
          description: studied_months / total_months, rounded; 100 when there is nothing to study.
        last_studied_at:
          type:
            - string
            - "null"
          format: date-time
        runtime_usable:
          type: boolean
          description: >
            False when no AI runtime is selected/enabled — studying is paused
            until the family picks a model.
        insights:
          type: array
          items:
            $ref: "#/components/schemas/AiStudyInsight"
    ConnectionCreateRequest:
      type: object
      required:
        - display_name
        - setup_token
      properties:
        provider:
          type: string
          enum: [simplefin]
          default: simplefin
        display_name:
          type: string
        setup_token:
          type: string
    InstitutionConnection:
      type: object
      required:
        - id
        - provider
        - display_name
        - status
        - created_at
      properties:
        id:
          type: string
        provider:
          type: string
        display_name:
          type: string
        status:
          type: string
        last_synced_at:
          type:
            - string
            - "null"
          format: date-time
        last_sync_error:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
    ConnectionListResponse:
      type: object
      required:
        - connections
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/InstitutionConnection"
    ConnectionSyncResult:
      type: object
      required:
        - accounts_synced
        - imported
        - duplicates_skipped
      properties:
        accounts_synced:
          type: integer
        imported:
          type: integer
        duplicates_skipped:
          type: integer
        transfers_filed:
          type: integer
          default: 0
          description: >-
            Imported transactions auto-filed under the Transfers category
            (credit-card payments, bank-to-bank transfers) so the user need not
            tag them and they do not inflate spending.
        auto_categorized:
          type: integer
          default: 0
          description: >-
            Imported transactions auto-categorized by reusing the category the
            household previously assigned to the same merchant.
    AiApplyRequest:
      type: object
      required:
        - main_model
      properties:
        main_model:
          type: string
        vision_model:
          type:
            - string
            - "null"
    AiSwapStatus:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum: [idle, running, succeeded, failed, unavailable]
        main_model:
          type:
            - string
            - "null"
        vision_model:
          type:
            - string
            - "null"
        log_tail:
          type: string
    AiHardwareProfile:
      type: object
      required:
        - disk_free_gb
        - source
      properties:
        gpu_memory_gb:
          type:
            - number
            - "null"
        system_memory_gb:
          type:
            - number
            - "null"
        disk_free_gb:
          type: number
        source:
          type: string

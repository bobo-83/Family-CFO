openapi: 3.1.0
info:
  title: Family CFO API
  version: 0.2.0
  description: >
    Initial specification for the Family CFO self-hosted backend API.
    This contract is the source of truth for generated Swift and Angular clients.
servers:
  - url: /api/v1
    description: Local Family CFO server
tags:
  - name: Health
  - name: Pairing
  - name: Authentication
  - name: Household
  - name: Accounts
  - name: Transactions
  - name: Bills
  - name: Income
  - name: Goals
  - name: Advisor
  - name: Chat
  - name: Conversations
  - name: Imports
  - name: Connections
  - name: Documents
  - name: Reports
  - name: Backups
  - name: Audit
  - name: AI Runtime
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /pairing/sessions:
    post:
      tags:
        - Pairing
      operationId: createPairingSession
      summary: Create a short-lived pairing session for a device
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Pairing session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingSession"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /pairing/confirm:
    post:
      tags:
        - Pairing
      operationId: confirmPairing
      summary: Confirm mobile device pairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingConfirmRequest"
      responses:
        "200":
          description: Device paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCredential"
        "400":
          $ref: "#/components/responses/Error"
  /pairing/devices:
    get:
      tags:
        - Pairing
      operationId: listPairedDevices
      summary: List paired devices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paired devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairedDeviceListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /pairing/devices/{device_id}:
    delete:
      tags:
        - Pairing
      operationId: revokePairedDevice
      summary: Revoke a paired device
      security:
        - bearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Paired device revoked
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /auth/sessions:
    post:
      tags:
        - Authentication
      operationId: createAuthSession
      summary: Create a local authentication session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionCreateRequest"
      responses:
        "201":
          description: Authentication session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Authentication
      operationId: deleteAuthSession
      summary: Log out (revoke the current session)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/Error"
  /auth/sessions/refresh:
    post:
      tags:
        - Authentication
      operationId: refreshAuthSession
      summary: Rotate the current session token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New session issued; the old token is now invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
  /households:
    post:
      tags:
        - Household
      operationId: createHousehold
      summary: Bootstrap a household with its first owner (self-hosted first-run setup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdCreateRequest"
      responses:
        "201":
          description: Household created; returns an authenticated session for the new owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "409":
          $ref: "#/components/responses/Error"
  /household:
    get:
      tags:
        - Household
      operationId: getHouseholdContext
      summary: Get household financial context summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Household context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdContext"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      tags:
        - Household
      operationId: updateHousehold
      summary: "Update household settings (M43: emergency-fund target)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdUpdateRequest"
      responses:
        "200":
          description: Updated household context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdContext"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /household/members:
    get:
      tags:
        - Household
      operationId: listMembers
      summary: List household members
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Household members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Household
      operationId: createMember
      summary: Add a household member
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCreateRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /household/members/{user_id}:
    patch:
      tags:
        - Household
      operationId: updateMemberRole
      summary: Change a member's role
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberRoleUpdateRequest"
      responses:
        "200":
          description: Member role changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Household
      operationId: deleteMember
      summary: Remove a household member
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /audit:
    get:
      tags:
        - Audit
      operationId: listAuditEvents
      summary: List the household's audit events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /accounts:
    get:
      tags:
        - Accounts
      operationId: listAccounts
      summary: List accounts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Accounts
      operationId: createAccount
      summary: Create an account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreateRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /accounts/{account_id}:
    patch:
      tags:
        - Accounts
      operationId: updateAccount
      summary: Update an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdateRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Accounts
      operationId: deleteAccount
      summary: Delete an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /accounts/{account_id}/balances:
    post:
      tags:
        - Accounts
      operationId: recordAccountBalance
      summary: Record a new balance for an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountBalanceCreateRequest"
      responses:
        "201":
          description: Balance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /transactions:
    get:
      tags:
        - Transactions
      operationId: listTransactions
      summary: List transactions for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Transactions
      operationId: createTransaction
      summary: Manually create a transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreateRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /transactions/{transaction_id}:
    patch:
      tags:
        - Transactions
      operationId: updateTransaction
      summary: Update a transaction
      security:
        - bearerAuth: []
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdateRequest"
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Transactions
      operationId: deleteTransaction
      summary: Delete a transaction
      security:
        - bearerAuth: []
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Transaction deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /categories:
    get:
      tags:
        - Categories
      operationId: listCategories
      summary: List spending categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Categories
      operationId: createCategory
      summary: Create a spending category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /categories/{category_id}:
    delete:
      tags:
        - Categories
      operationId: deleteCategory
      summary: Delete a spending category
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Category deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /budgets:
    get:
      tags:
        - Budgets
      operationId: listBudgets
      summary: List budget envelopes with current-month progress
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Budgets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Budgets
      operationId: createBudget
      summary: Create a monthly budget envelope for a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetCreateRequest"
      responses:
        "201":
          description: Budget created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /budgets/{budget_id}:
    patch:
      tags:
        - Budgets
      operationId: updateBudget
      summary: Change a budget envelope's monthly limit
      security:
        - bearerAuth: []
      parameters:
        - name: budget_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetUpdateRequest"
      responses:
        "200":
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Budgets
      operationId: deleteBudget
      summary: Delete a budget envelope
      security:
        - bearerAuth: []
      parameters:
        - name: budget_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Budget deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /bills:
    get:
      tags:
        - Bills
      operationId: listBills
      summary: List recurring bills for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Bills
      operationId: createBill
      summary: Create a recurring bill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillCreateRequest"
      responses:
        "201":
          description: Bill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /bills/suggestions:
    get:
      tags:
        - Bills
      operationId: listBillSuggestions
      summary: Suggest bills detected from recurring account transactions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Suggested bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillSuggestionListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /bills/suggestions/dismissals:
    post:
      tags:
        - Bills
      operationId: dismissBillSuggestion
      summary: Dismiss a suggested bill (not a bill)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillSuggestionDismissRequest"
      responses:
        "204":
          description: Suggestion dismissed
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /bills/{bill_id}:
    patch:
      tags:
        - Bills
      operationId: updateBill
      summary: Update a recurring bill
      security:
        - bearerAuth: []
      parameters:
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillUpdateRequest"
      responses:
        "200":
          description: Bill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Bills
      operationId: deleteBill
      summary: Delete a recurring bill
      security:
        - bearerAuth: []
      parameters:
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Bill deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /income:
    get:
      tags:
        - Income
      operationId: listIncomeSources
      summary: List income sources for the household
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Income sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Income
      operationId: createIncomeSource
      summary: Create an income source
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeCreateRequest"
      responses:
        "201":
          description: Income source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeSource"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /income/{income_id}:
    patch:
      tags:
        - Income
      operationId: updateIncomeSource
      summary: Update an income source
      security:
        - bearerAuth: []
      parameters:
        - name: income_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeUpdateRequest"
      responses:
        "200":
          description: Income source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeSource"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Income
      operationId: deleteIncomeSource
      summary: Delete an income source
      security:
        - bearerAuth: []
      parameters:
        - name: income_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Income source deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /income/analysis:
    get:
      tags:
        - Income
      operationId: getIncomeAnalysis
      summary: Detect income from checking-account deposits and estimate annual tax
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Income analysis with evidence transactions and tax estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeAnalysisResponse"
        "401":
          $ref: "#/components/responses/Error"
  /income/analysis/overrides:
    post:
      tags:
        - Income
      operationId: setIncomeOverride
      summary: Include, exclude, or reset a deposit in the income analysis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeOverrideRequest"
      responses:
        "204":
          description: Override stored
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

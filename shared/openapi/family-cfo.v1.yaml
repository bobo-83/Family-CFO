          type: string
          format: date
        net_worth:
          $ref: "#/components/schemas/Money"
    UpcomingBill:
      type: object
      required:
        - id
        - name
        - amount
        - due_date
        - days_until
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        due_date:
          type: string
          format: date
        days_until:
          description: Whole days from today to the next occurrence (0 = due today).
          type: integer
    EmergencyFundSummary:
      type: object
      required:
        - reserved
        - using_designations
        - monthly_expenses
        - target_months_min
        - target_months_recommended
        - status
      properties:
        months:
          description: Months of expenses the fund covers; null when there are no bills.
          type:
            - number
            - "null"
          format: double
        reserved:
          description: The fund balance used — designated total when set, else all liquid money.
          $ref: "#/components/schemas/Money"
        using_designations:
          description: True when the fund comes from explicit account designations (M36).
          type: boolean
        monthly_expenses:
          $ref: "#/components/schemas/Money"
        target_months_min:
          type: number
        target_months_recommended:
          type: number
        gap_to_recommended:
          description: Money still needed to reach the recommended target; 0 when funded, absent when no bills.
          $ref: "#/components/schemas/Money"
        goal_target:
          description: >
            The household's own emergency_fund goal target (M75); the status
            is the more conservative of months-coverage and goal progress.
          $ref: "#/components/schemas/Money"
        status:
          type: string
          enum: [no_bills, no_fund, getting_started, on_track, fully_funded]
    MonthlyCashFlow:
      type: object
      required:
        - income
        - bills
        - net
      properties:
        income:
          $ref: "#/components/schemas/Money"
        bills:
          $ref: "#/components/schemas/Money"
        net:
          description: Income minus bills; excludes discretionary spending.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Money:
      type: object
      required:
        - amount_minor
        - currency
      properties:
        amount_minor:
          type: integer
          format: int64
          description: Signed integer amount in minor currency units.
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
    PairingSession:
      type: object
      required:
        - id
        - qr_payload
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        qr_payload:
          type: string
        expires_at:
          type: string
          format: date-time
    PairingConfirmRequest:
      type: object
      required:
        - pairing_session_id
        - device_name
        - device_public_key
      properties:
        pairing_session_id:
          type: string
          format: uuid
        device_name:
          type: string
          minLength: 1
          maxLength: 120
        device_public_key:
          type: string
          minLength: 1
    DeviceCredential:
      type: object
      required:
        - device_id
        - access_token
        - expires_at
      properties:
        device_id:
          type: string
          format: uuid
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
    PairedDevice:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type:
            - string
            - "null"
          format: date-time
        revoked_at:
          type:
            - string
            - "null"
          format: date-time
    PairedDeviceListResponse:
      type: object
      required:
        - devices
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/PairedDevice"
    AuthSessionCreateRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    AuthSession:
      type: object
      required:
        - access_token
        - expires_at
        - household_id
        - user_id
        - role
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        household_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/HouseholdRole"
    HouseholdRole:
      type: string
      enum:
        - owner
        - adult
        - viewer
        - child
    RecurringFrequency:
      type: string
      enum:
        - weekly
        - biweekly
        - semimonthly
        - monthly
        - quarterly
        - annual
    Transaction:
      type: object
      required:
        - id
        - account_id
        - occurred_at
        - amount
      properties:

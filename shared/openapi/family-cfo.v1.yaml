            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionSyncResult"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Money:
      type: object
      required:
        - amount_minor
        - currency
      properties:
        amount_minor:
          type: integer
          format: int64
          description: Signed integer amount in minor currency units.
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
    PairingSessionCreateRequest:
      type: object
      description: >-
        Owner-only: mint the pairing code for another household member so a
        regular member never signs into the dashboard to pair their phone.
        Omit to pair for yourself.
      properties:
        user_id:
          type:
            - string
            - "null"
          format: uuid
    PairingSession:
      type: object
      required:
        - id
        - qr_payload
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        qr_payload:
          type: string
        expires_at:
          type: string
          format: date-time
    PairingConfirmRequest:
      type: object
      required:
        - pairing_session_id
        - device_name
        - device_public_key
      properties:
        pairing_session_id:
          type: string
          format: uuid
        device_name:
          type: string
          minLength: 1
          maxLength: 120
        device_public_key:
          type: string
          minLength: 1
    DeviceCredential:
      type: object
      required:
        - device_id
        - access_token
        - expires_at
      properties:
        device_id:
          type: string
          format: uuid
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        role:
          description: >-
            M83: household role of the user the device acts as (the pairing
            session's creator), so the mobile app can build its role-aware
            shell without spending the device token on a session refresh.
          $ref: "#/components/schemas/HouseholdRole"
        role_name:
          description: "ADR 0034: name of the assigned role (preset or custom)."
          type:
            - string
            - "null"
        rights:
          description: "ADR 0034: resolved rights — clients gate screens with these."
          type:
            - array
            - "null"
          items: { type: string }
        household_id:
          description: >-
            ADR 0056: the household, so the email-login path (no QR payload)
            can build the device's ServerConfig. Also populated on QR confirm.
          type:
            - string
            - "null"
        household_name:
          type:
            - string
            - "null"
    PairingLoginRequest:
      type: object
      description: >-
        ADR 0056: credentialed pairing — the iOS login screen. Same outcome as
        a QR confirm: a paired device with a device-bound session.
      required:
        - email
        - password
        - device_name
        - device_public_key
      properties:
        email:
          type: string
          minLength: 3
          maxLength: 255
        password:
          type: string
          minLength: 1
        device_name:
          type: string
          minLength: 1
          maxLength: 120
        device_public_key:
          type: string
          minLength: 1
    PairedDevice:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          description: The household member this device is paired to.
          type:
            - string
            - "null"
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type:
            - string
            - "null"
          format: date-time
        revoked_at:
          type:
            - string
            - "null"
          format: date-time
    PairedDeviceListResponse:
      type: object
      required:
        - devices
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/PairedDevice"
    AuthSessionCreateRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    AuthSession:
      type: object
      required:
        - access_token
        - expires_at
        - household_id
        - user_id
        - role
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        household_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/HouseholdRole"
        role_name:
          description: "ADR 0034: name of the assigned role (preset or custom)."
          type:
            - string
            - "null"
        rights:
          description: "ADR 0034: resolved rights — clients gate screens with these."
          type:
            - array
            - "null"
          items: { type: string }
    HouseholdRole:
      type: string
      enum:
        - owner
        - adult
        - viewer
        - child
    RecurringFrequency:
      type: string
      enum:
        - weekly
        - biweekly
        - semimonthly
        - monthly
        - quarterly
        - annual
    Transaction:
      type: object
      required:
        - id
        - account_id
        - occurred_at
        - amount
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        merchant:
          type: string
        category:
          type: string
        category_id:
          type:
            - string
            - "null"
          format: uuid
        description:
          type: string
        account_name:
          description: "M96: display name of the account this transaction lives in."
          type:
            - string
            - "null"
        counterparty:
          description: >-
            M96: for a transfer whose other leg is a linked account, that account's
            name — so a generic 'Online Transfer' can be shown as source → destination.
          type:
            - string
            - "null"
        duplicate_state:
          description: >-
            M97: NULL normally; 'flagged' (detected exact duplicate), 'dismissed'
            (a legitimate repeat the user kept), or 'disputed' (contesting).
          type:
            - string
            - "null"
          enum: [flagged, dismissed, disputed]
        external_id:
          description: >-
            M97: the bank/aggregator's reference for this record — distinguishes
            two otherwise-identical duplicate legs in the Review queue.
          type:
            - string
            - "null"
        institution:
          description: >-
            M97: the institution (bank) this account was synced from, so the user
            knows where to look the transaction up. Null for manual accounts.
          type:
            - string
            - "null"
        note:
          description: "M100: a user's free-text note."
          type:
            - string
            - "null"
        has_attachment:
          description: "M100: whether an image is attached to this transaction."
          type: boolean
        suspected_income:
          description: "ADR 0049: a sizeable inflow filed as a Transfer with no\
            \ matching internal leg — likely a misfiled paycheck. The UI badges it\
            \ and offers 'confirm as income' until the user rules on it."
          type: boolean
    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    CategoryListResponse:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
    CategoryUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
    Bill:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        account_id:
          type: string
          format: uuid
        category_id:
          description: "M96: the spending category this bill is filed under."
          type:
            - string
            - "null"
        category_name:
          type:
            - string
            - "null"
        transactions_categorized:
          description: "M96: matching transactions auto-filed under this category by the create/update that set it; null when listing."
          type:
            - integer
            - "null"
    IncomeSource:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
    AccountListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    TransactionListResponse:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
    AccountObligation:
      type: object
      description: >
        M106: a recurring monthly payment on a liability account — a mortgage/loan
        payment, a lease, or a payroll-deducted 401(k)-loan repayment — shown on
        the Bills tab alongside actual bills. `note` explains its balance-sheet
        effect; `reserved` is whether safe-to-spend already holds it back.
      required:
        - account_id
        - name
        - amount
        - kind
        - note
        - reserved
      properties:
        account_id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        kind:
          type: string
          enum: [mortgage, loan, lease, retirement_loan]
        note:
          type: string
        reserved:
          type: boolean
    BillListResponse:
      type: object
      required:
        - bills
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
        account_obligations:
          type: array
          items:
            $ref: "#/components/schemas/AccountObligation"
    OutlookEvent:
      type: object
      description: >-
        One expected cash movement in the outlook window (M112): a payday
        (positive amount) or a payment (negative amount).
      required:
        - occurred_on
        - name
        - amount
        - kind
      properties:
        occurred_on:
          type: string
          format: date
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        kind:
          type: string
          enum: [income, bill, credit_card, mortgage, loan, lease]
    CashOutlookResponse:
      type: object
      description: >-
        Projected cash over the horizon (M112, ADR 0026): paychecks in, payments
        out, and the lowest point the balance reaches — the lived counterpart to
        safe-to-spend's zero-income stress test.
      required:
        - starting_cash
        - events
        - ending_cash
        - lowest_balance
        - expected_income
        - obligations
        - horizon_days
        - due_soon
        - due_soon_covered
        - due_soon_window_days
      properties:
        starting_cash:
          $ref: "#/components/schemas/Money"
        events:
          type: array
          items:
            $ref: "#/components/schemas/OutlookEvent"
        ending_cash:
          $ref: "#/components/schemas/Money"
        lowest_balance:
          $ref: "#/components/schemas/Money"
        lowest_date:
          type:
            - string
            - "null"
          format: date
        expected_income:
          $ref: "#/components/schemas/Money"
        obligations:
          $ref: "#/components/schemas/Money"
        horizon_days:
          type: integer
        due_soon:
          $ref: "#/components/schemas/Money"
        due_soon_covered:
          type: boolean
        due_soon_window_days:
          type: integer
    SpendingPlanResponse:
      type: object
      description: >-
        M113 (ADR 0027): left to spend this month — expected income minus
        what's already spent and what's still committed. `per_day` is a pace,
        not a rule; zero when `left_to_spend` is negative.
      required:
        - month
        - income_received
        - income_projected
        - expected_income
        - spent
        - bills_remaining
        - account_obligations
        - planned_savings
        - left_to_spend
        - per_day
        - days_remaining
      properties:
        month:
          type: string
        income_received:
          $ref: "#/components/schemas/Money"
        income_projected:
          $ref: "#/components/schemas/Money"
        expected_income:
          $ref: "#/components/schemas/Money"
        spent:
          $ref: "#/components/schemas/Money"
        bills_remaining:
          $ref: "#/components/schemas/Money"
        account_obligations:
          $ref: "#/components/schemas/Money"
        planned_savings:
          $ref: "#/components/schemas/Money"
        left_to_spend:
          $ref: "#/components/schemas/Money"
        per_day:
          $ref: "#/components/schemas/Money"
        days_remaining:
          type: integer
    TimelinePaidWith:
      type: object
      description: >-
        The actual transaction that satisfied a timeline item — the receipt
        behind the checkmark, so a "Paid" claim is always verifiable (ADR 0024).
      required:
        - transaction_id
        - occurred_at
        - amount
        - label
      properties:
        transaction_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        label:
          type: string
    PaymentTimelineItem:
      type: object
      description: >-
        One payment on the Bills timeline (M111): a bill, a credit-card payment,
        or a loan/lease payment. `amount` is the expected figure (a bill's
        estimate — variable utilities show their typical amount — a card's
        pay-in-full balance, a loan's monthly payment); `paid_with` carries the
        matched actual charge when status is "paid".
      required:
        - id
        - kind
        - name
        - amount
        - status
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [bill, credit_card, mortgage, loan, lease]
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        due_date:
          type:
            - string
            - "null"
          format: date
        days_until:
          type:
            - integer
            - "null"
        status:
          type: string
          enum: [overdue, due_soon, upcoming, paid, no_date]
        paid_with:
          $ref: "#/components/schemas/TimelinePaidWith"
    PaymentTimelineResponse:
      type: object
      required:
        - items
        - due_total
        - liquid_balance
        - covered
        - window_days
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PaymentTimelineItem"
        due_total:
          $ref: "#/components/schemas/Money"
        liquid_balance:
          $ref: "#/components/schemas/Money"
        covered:
          type: boolean
        window_days:
          type: integer
    BillSuggestion:
      type: object
      description: >
        A recurring charge detected in checking/credit-card transactions
        (M58). Deterministic pattern-matching, not an AI guess — every
        suggestion is explainable as "N charges of ~amount at ~cadence".
      required:
        - merchant_key
        - name
        - amount
        - frequency
        - next_due_date
        - occurrences
        - last_seen
      properties:
        merchant_key:
          type: string
          description: Normalized merchant identifier; used to dismiss.
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        occurrences:
          type: integer
        last_seen:
          type: string
          format: date
    BillUpdateSuggestion:
      type: object
      description: >
        An existing bill whose live charge pattern has drifted (M59): the
        detected median amount or cadence no longer matches the stored bill.
        Applying it is always a user-confirmed PATCH — never silent.
      required:
        - bill_id
        - name
        - dismiss_key
        - current_amount
        - suggested_amount
        - frequency
        - next_due_date
        - occurrences
        - last_seen
      properties:
        bill_id:
          type: string
          format: uuid
        name:
          type: string
        dismiss_key:
          type: string
          description: >
            Pass to the dismissal endpoint to mute THIS suggested value; a
            later different value prompts again.
        current_amount:
          $ref: "#/components/schemas/Money"
        suggested_amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        occurrences:
          type: integer
        last_seen:
          type: string
          format: date
    BillSuggestionListResponse:
      type: object
      required:
        - suggestions
        - updates
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/BillSuggestion"
        updates:
          type: array
          items:
            $ref: "#/components/schemas/BillUpdateSuggestion"
    BillSuggestionDismissRequest:
      type: object
      required:
        - merchant_key
      properties:
        merchant_key:
          type: string
          minLength: 1
          maxLength: 120
    Memory:
      type: object
      description: >
        A durable household fact the advisor remembers across conversations
        (M57, ADR 0016). Facts survive conversation deletion by design;
        deleting the memory itself is the forget operation.
      required:
        - id
        - key
        - value
        - source
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Stable identifier; a restated fact updates, not duplicates.
        value:
          type: string
        source:
          type: string
          enum: [chat, manual]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MemoryListResponse:
      type: object
      required:
        - memories
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/Memory"
    MemoryCreateRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          minLength: 1
          maxLength: 500
    IncomeAnalysisTransaction:
      type: object
      required:
        - transaction_id
        - occurred_at
        - amount
        - name
        - excluded
      properties:
        transaction_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        name:
          type: string
        merchant:
          type: string
          description: The payer/sender as the bank reported it.
        description:
          type: string
          description: Full untruncated bank memo (often names the source account).
        account_name:
          type: string
          description: The account the deposit landed in.
        institution:
          type: string
          description: >-
            ADR 0054: the bank behind the account (e.g. "Charles Schwab") — matters
            for RSU/ESPP deposits that land in a brokerage, not a checking account.
        excluded:
          type: boolean
    IncomeSourceAnalysis:
      type: object
      description: >
        A recurring deposit pattern detected in checking accounts (M61) with
        every underlying transaction shown as editable evidence.
      required:
        - source_key
        - name
        - frequency
        - manually_added
        - typical_amount
        - total_amount
        - transactions
      properties:
        source_key:
          type: string
        name:
          type: string
        frequency:
          type: string
          description: Detected cadence, or "irregular" for manually-added deposits.
        manually_added:
          type: boolean
        typical_amount:
          $ref: "#/components/schemas/Money"
        total_amount:
          $ref: "#/components/schemas/Money"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/IncomeAnalysisTransaction"
    IncomeRollup:
      type: object
      required:
        - annual_income
        - monthly_average
        - transaction_count
        - window_days
      properties:
        annual_income:
          $ref: "#/components/schemas/Money"
        monthly_average:
          $ref: "#/components/schemas/Money"
        transaction_count:
          type: integer
        window_days:
          type: integer
        coverage_start:
          type: string
          format: date
          description: Earliest synced checking transaction in the window.
        coverage_days:
          type: integer
          description: How many days of history the analysis actually has.
    TaxEstimate:
      type: object
      description: >
        Deterministic US federal + FICA estimate with explicit assumptions
        (standard deduction only, no credits, no state tax). When income is
        treated as take-home, gross is recovered by solving
        gross − tax(gross) = net.
      required:
        - tax_year
        - filing_status
        - income_treated_as_net
        - gross_income
        - standard_deduction
        - taxable_income
        - federal_income_tax
        - fica_tax
        - total_tax
        - effective_rate
        - assumptions
      properties:
        tax_year:
          type: integer
        filing_status:
          type: string
          enum: [single, married_joint, head_of_household]
        income_treated_as_net:
          type: boolean
        state:
          type: string
          description: USPS state code used for state income tax (M65).
        gross_income:
          $ref: "#/components/schemas/Money"
        net_income:
          $ref: "#/components/schemas/Money"
        standard_deduction:
          $ref: "#/components/schemas/Money"
        taxable_income:
          $ref: "#/components/schemas/Money"
        federal_income_tax:
          $ref: "#/components/schemas/Money"
        fica_tax:
          $ref: "#/components/schemas/Money"
        state_income_tax:
          $ref: "#/components/schemas/Money"
        total_tax:
          $ref: "#/components/schemas/Money"
        effective_rate:
          type: number
        assumptions:
          type: array
          items:
            type: string
    IncomeEarner:
      type: object
      required: [id, label, base_salary, rsu_annual]
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        base_salary: { $ref: "#/components/schemas/Money" }
        rsu_annual: { $ref: "#/components/schemas/Money" }
        rsu_frequency:
          type: string
          enum: [monthly, quarterly, semiannual, annual]
        rsu_next_vest_date: { type: string, format: date }
        bonus_percent: { type: number }
        bonus_month: { type: integer }
        w2_year: { type: integer }
        w2_wages: { $ref: "#/components/schemas/Money" }
        w2_withheld: { $ref: "#/components/schemas/Money" }
    ExpectedIncomeEvent:
      type: object
      required: [date, label, amount]
      properties:
        date: { type: string, format: date }
        label: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
    IncomeProfile:
      type: object
      description: >
        Declared compensation (M73). When present it is the authority for the
        tax estimate — no net-to-gross inference.
      required: [earners, expected_annual_gross, expected_events]
      properties:
        earners:
          type: array
          items: { $ref: "#/components/schemas/IncomeEarner" }
        expected_annual_gross: { $ref: "#/components/schemas/Money" }
        expected_events:
          type: array
          items: { $ref: "#/components/schemas/ExpectedIncomeEvent" }
    IncomeEarnerCreateRequest:
      type: object
      required: [label]
      properties:
        label: { type: string, minLength: 1, maxLength: 120 }
        base_salary_minor: { type: integer, minimum: 0 }
        rsu_annual_minor: { type: integer, minimum: 0 }
        rsu_frequency:
          type: string
          enum: [monthly, quarterly, semiannual, annual]
        rsu_next_vest_date: { type: string, format: date }
        bonus_percent: { type: number, minimum: 0, maximum: 100 }
        bonus_month: { type: integer, minimum: 1, maximum: 12 }
        w2_year: { type: integer }
        w2_wages_minor: { type: integer, minimum: 0 }
        w2_withheld_minor: { type: integer, minimum: 0 }
    W2ScanRequest:
      type: object
      required: [image_base64, image_media_type]
      properties:
        image_base64: { type: string }
        image_media_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
    W2ScanResult:
      type: object
      description: Candidate values only — the user confirms before anything is saved.
      required: [note]
      properties:
        year: { type: integer }
        employer: { type: string }
        wages_minor: { type: integer }
        federal_withheld_minor: { type: integer }
        note: { type: string }
    LoanScanRequest:
      type: object
      required: [image_base64, image_media_type]
      properties:
        image_base64: { type: string }
        image_media_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
    LoanScanResult:
      type: object
      description: >-
        Candidate loan/lease values read from a statement — the user confirms and
        edits before saving. For a lease with no stated payoff, balance is estimated
        as payments_remaining × the monthly payment.
      required: [note]
      properties:
        name: { type: string }
        monthly_payment_minor: { type: integer }
        balance_minor: { type: integer }
        payments_remaining: { type: integer }
        maturity_date: { type: string, format: date }
        next_payment_due_date: { type: string, format: date }
        apr_percent: { type: number }
        is_lease: { type: boolean }
        note: { type: string }
    AccountScanRequest:
      type: object
      required: [image_base64, image_media_type]
      properties:
        image_base64: { type: string }
        image_media_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
    AccountScanResult:
      type: object
      description: >-
        ADR 0057: candidate values read from an ASSET-account statement (HSA,
        savings, brokerage, …) to prefill the add-account form — the user
        confirms and edits before anything is saved. An HSA/brokerage statement
        often splits CASH and INVESTMENTS across pages; balance_minor is their
        total and the components ride along for the breakdown.
      required: [note]
      properties:
        name: { type: string }
        account_type:
          $ref: "#/components/schemas/AccountType"
        balance_minor: { type: integer }
        cash_balance_minor: { type: integer }
        investment_value_minor: { type: integer }
        statement_date: { type: string, format: date }
        note: { type: string }
    BillScanRequest:
      type: object
      required: [image_base64, image_media_type]
      properties:
        image_base64: { type: string }
        image_media_type:
          type: string
          enum: [image/jpeg, image/png, image/webp, application/pdf]
    BillScanResult:
      type: object
      description: >-
        Candidate bill values read from a photo or PDF — the user confirms and
        edits before anything is saved.
      required: [note]
      properties:
        name: { type: string }
        amount_minor: { type: integer }
        frequency:
          type: string
          enum: [weekly, biweekly, semimonthly, monthly, quarterly, annual]
        next_due_date: { type: string, format: date }
        note: { type: string }
    IncomeAnalysisResponse:
      type: object
      required:
        - sources
        - other_inflows
        - rollup
        - tax
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/IncomeSourceAnalysis"
        other_inflows:
          type: array
          items:
            $ref: "#/components/schemas/IncomeAnalysisTransaction"
        rollup:
          $ref: "#/components/schemas/IncomeRollup"
        profile:
          $ref: "#/components/schemas/IncomeProfile"
        coverage_warning:
          type: string
          description: >
            Present when the synced history does not span the full analysis
            window (e.g. it starts mid-year) — income and tax are then likely
            underestimated. Internal transfers between the household's own
            accounts are never shown or counted (M63).
        tax:
          $ref: "#/components/schemas/TaxEstimate"
    IncomeOverrideRequest:
      type: object
      required:
        - transaction_id
        - verdict
      properties:
        transaction_id:
          type: string
          format: uuid
        verdict:
          type: string
          enum: [include, exclude, clear]
    IncomeTaxSettingsRequest:
      type: object
      required:
        - tax_filing_status
        - income_treated_as_net
      properties:
        tax_filing_status:
          type: string
          enum: [single, married_joint, head_of_household]
        income_treated_as_net:
          type: boolean
        state:
          type: string
          minLength: 2
          maxLength: 2
          description: >
            USPS state code for state income tax (M65). Only the state is
            collected — never a street address. Null clears it.
    IncomeListResponse:
      type: object
      required:
        - income
      properties:
        income:
          type: array
          items:
            $ref: "#/components/schemas/IncomeSource"
    GoalListResponse:
      type: object
      required:
        - goals
      properties:
        goals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"
    HouseholdContext:
      type: object
      required:
        - household_id
        - display_name
        - currency
        - net_worth
        - emergency_fund_months
      properties:
        household_id:
          type: string
          format: uuid
        display_name:
          type: string
        currency:
          type: string
          example: USD
        net_worth:
          $ref: "#/components/schemas/Money"
        emergency_fund_months:
          type: number
          format: double
        emergency_fund:
          description: "M38: emergency-fund coverage vs the standard 3–6 month guidance."
          $ref: "#/components/schemas/EmergencyFundSummary"
        monthly_cash_flow:
          description: "M38: recurring income vs bills, normalized monthly."
          $ref: "#/components/schemas/MonthlyCashFlow"
        asset_breakdown:
          description: "M38: positive balances grouped by spendability category (ordered)."
          type: array
          items:
            $ref: "#/components/schemas/AssetCategoryTotal"
        total_debt:
          description: "M38: positive sum of all negative account balances."
          $ref: "#/components/schemas/Money"
        upcoming_bills:
          description: "M39: bills due within the next 14 days, soonest first."
          type: array
          items:
            $ref: "#/components/schemas/UpcomingBill"
        net_worth_history:
          description: "M40: recent net-worth snapshots, oldest-first, for the trend sparkline."
          type: array
          items:
            $ref: "#/components/schemas/NetWorthPoint"
        top_goal:
          description: "M41: the highest-priority savings goal with progress, when one exists."
          $ref: "#/components/schemas/GoalProgress"
        spending_insights:
          description: "M42: month-to-date spending vs the same period last month, plus top merchants."
          $ref: "#/components/schemas/SpendingInsights"
        savings_rate:
          description: "M44: recurring income vs trailing-3-month average actual spending."
          $ref: "#/components/schemas/SavingsRate"
        budget_summary:
          description: "M46: envelope health (over/warning counts, budgeted vs spent); absent when no budgets exist."
          $ref: "#/components/schemas/BudgetSummary"
        safe_to_spend:
          description: "M93: liquid cash minus the emergency fund, bills due, and minimum debt payments — what's actually free to spend right now."
          $ref: "#/components/schemas/SafeToSpend"
        spending_by_category:
          description: "M94: this month's spending grouped by category (the payoff of categorizing); absent when nothing has been spent this month."
          $ref: "#/components/schemas/SpendingByCategory"
        last_synced_at:
          description: "M96: most recent successful bank sync across linked institutions, so the Overview can show how fresh the data is. Null when never synced."
          type:
            - string
            - "null"
          format: date-time
        earliest_month:
          description: "M96: 'YYYY-MM' of the oldest transaction, so the month picker stops there."
          type:
            - string
            - "null"
        review_count:
          description: "M97: transactions awaiting duplicate review, for the Review tab badge."
          type: integer
    Budget:
      type: object
      required:
        - id
        - category_id
        - category_name
        - limit
        - spent
        - remaining
        - percent_used
        - status
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
        limit:
          $ref: "#/components/schemas/Money"
        spent:
          description: Outflow in this category during the current calendar month.
          $ref: "#/components/schemas/Money"
        remaining:
          description: limit − spent; negative when over budget.
          $ref: "#/components/schemas/Money"
        percent_used:
          description: Raw spent/limit percent; may exceed 100.
          type: integer
        status:
          type: string
          enum: [under, warning, over]
    BudgetListResponse:
      type: object
      required:
        - budgets
      properties:
        budgets:
          type: array
          items:
            $ref: "#/components/schemas/Budget"
    BudgetCreateRequest:
      type: object
      required:
        - category_id
        - limit
      properties:
        category_id:
          type: string
          format: uuid
        limit:
          $ref: "#/components/schemas/Money"
    BudgetUpdateRequest:
      type: object
      required:
        - limit
      properties:
        limit:
          $ref: "#/components/schemas/Money"
    BudgetSummary:
      type: object
      required:
        - envelope_count
        - over_count
        - warning_count
        - total_budgeted
        - total_spent
      properties:
        envelope_count:
          type: integer
        over_count:
          type: integer
        warning_count:
          description: Envelopes at ≥80% of their limit (but not over).
          type: integer
        total_budgeted:
          $ref: "#/components/schemas/Money"
        total_spent:
          $ref: "#/components/schemas/Money"
    SpendingByCategory:
      type: object
      description: "M94: this calendar month's outflow grouped by category, the visible result of categorizing transactions."
      required:
        - month
        - month_label
        - categorized_total
        - uncategorized
      properties:
        month:
          description: "The covered month as ISO year-month, e.g. \"2026-07\" — so a client can filter transactions to exactly this window."
          type: string
        month_label:
          description: "The month this covers, e.g. \"July 2026\"."
          type: string
        categories:
          description: "Per-category spend this month, highest first."
          type: array
          items:
            $ref: "#/components/schemas/CategorySpend"
        categorized_total:
          description: "Sum of all categorized spend this month."
          $ref: "#/components/schemas/Money"
        uncategorized:
          description: "This month's outflow not yet categorized — files it and it moves into a category above."
          $ref: "#/components/schemas/Money"
    CategorySpend:
      type: object
      required:
        - category_id
        - category_name
        - amount
      properties:
        category_id:
          type: string
        category_name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
    SafeToSpend:
      type: object
      description: "M93: money actually free to spend now — liquid cash net of the emergency fund, bills due, and minimum debt payments. Income during the window is NOT counted."
      required:
        - liquid_balance
        - emergency_fund_reserved
        - bills_due
        - minimum_debt_payments
        - committed_total
        - safe_to_spend
        - total_debt
        - warnings
      properties:
        liquid_balance:
          description: Checking + savings only (never retirement/education funds).
          $ref: "#/components/schemas/Money"
        emergency_fund_reserved:
          description: Money explicitly designated for emergencies; held back.
          $ref: "#/components/schemas/Money"
        bills_due:
          description: Bills falling due within the horizon.
          $ref: "#/components/schemas/Money"
        minimum_debt_payments:
          description: Minimum payments owed on liability accounts with recorded terms.
          $ref: "#/components/schemas/Money"
        credit_card_payments:
          description: "M96: full credit-card balances when the household pays cards in full monthly; absent/0 otherwise."
          allOf:
            - $ref: "#/components/schemas/Money"
        subscription_forecast:
          description: "M109 (ADR 0020): recurring subscriptions' next in-window charge, reserved the 'bill way' (never a monthly total). Absent/0 when none are upcoming."
          allOf:
            - $ref: "#/components/schemas/Money"
        committed_total:
          description: emergency_fund_reserved + bills_due + minimum_debt_payments.
          $ref: "#/components/schemas/Money"
        safe_to_spend:
          description: liquid_balance − committed_total. May be negative.
          $ref: "#/components/schemas/Money"
        total_debt:
          description: "All liabilities as a positive amount — reported, never subtracted, so spendable cash is never shown without the debt beside it."
          $ref: "#/components/schemas/Money"
        warnings:
          description: "Human-readable caveats (e.g. debts with no recorded minimum payment understate what's committed)."
          type: array
          items:
            type: string
        liquid_accounts:
          description: "M96: the checking/savings accounts that add up to liquid_balance, for the detail drill-down."
          type: array
          items:
            $ref: "#/components/schemas/LiquidAccountBalance"
        minimum_debt_items:
          description: "M96: the debts and their minimum payments behind minimum_debt_payments."
          type: array
          items:
            $ref: "#/components/schemas/NamedAmount"
        credit_card_items:
          description: "M96: the cards and their balances behind credit_card_payments (when paid in full)."
          type: array
          items:
            $ref: "#/components/schemas/NamedAmount"
        bill_items:
          description: "M98: the bills behind bills_due, over the safe-to-spend horizon."
          type: array
          items:
            $ref: "#/components/schemas/NamedAmount"
        emergency_fund_items:
          description: "M98: the accounts and how much of each is reserved as emergency fund."
          type: array
          items:
            $ref: "#/components/schemas/NamedAmount"
        subscription_forecast_items:
          description: "M109: the recurring subscriptions (next charge + amount) behind subscription_forecast."
          type: array
          items:
            $ref: "#/components/schemas/NamedAmount"
    LiquidAccountBalance:
      type: object
      required:
        - name
        - balance
      properties:
        name:
          type: string
        balance:
          $ref: "#/components/schemas/Money"
    NamedAmount:
      type: object
      required:
        - name
        - amount
      properties:
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
    SavingsRate:

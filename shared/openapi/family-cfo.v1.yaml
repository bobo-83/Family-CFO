openapi: 3.1.0
info:
  title: Family CFO API
  version: 0.2.0
  description: >
    Initial specification for the Family CFO self-hosted backend API.
    This contract is the source of truth for generated Swift and Angular clients.
servers:
  - url: /api/v1
    description: Local Family CFO server
tags:
  - name: Health
  - name: Pairing
  - name: Authentication
  - name: Household
  - name: Accounts
  - name: Transactions
  - name: Bills
  - name: Income
  - name: Goals
  - name: Advisor
  - name: Chat
  - name: Conversations
  - name: Imports
  - name: Connections
  - name: Documents
  - name: Reports
  - name: Backups
  - name: Audit
  - name: AI Runtime
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /pairing/sessions:
    post:
      tags:
        - Pairing
      operationId: createPairingSession
      summary: Create a short-lived pairing session for a device
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingSessionCreateRequest"
      responses:
        "201":
          description: Pairing session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingSession"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /pairing/confirm:
    post:
      tags:
        - Pairing
      operationId: confirmPairing
      summary: Confirm mobile device pairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingConfirmRequest"
      responses:
        "200":
          description: Device paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCredential"
        "400":
          $ref: "#/components/responses/Error"
  /pairing/login:
    post:
      tags:
        - Pairing
      operationId: createDeviceSessionWithPassword
      summary: Sign a device in with email + password (credentialed pairing)
      description: >-
        ADR 0056: the iOS login screen. Same outcome as a QR confirm — a paired
        device with a device-bound session — so the Devices page and revocation
        cover phones however they signed in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingLoginRequest"
      responses:
        "201":
          description: Device signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCredential"
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /pairing/devices:
    get:
      tags:
        - Pairing
      operationId: listPairedDevices
      summary: List paired devices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paired devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairedDeviceListResponse"
        "401":
          $ref: "#/components/responses/Error"
  /pairing/devices/{device_id}:
    delete:
      tags:
        - Pairing
      operationId: revokePairedDevice
      summary: Revoke a paired device
      security:
        - bearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Paired device revoked
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /auth/sessions:
    post:
      tags:
        - Authentication
      operationId: createAuthSession
      summary: Create a local authentication session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionCreateRequest"
      responses:
        "201":
          description: Authentication session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Authentication
      operationId: deleteAuthSession
      summary: Log out (revoke the current session)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: "#/components/responses/Error"
  /auth/sessions/refresh:
    post:
      tags:
        - Authentication
      operationId: refreshAuthSession
      summary: Rotate the current session token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New session issued; the old token is now invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
  /households:
    post:
      tags:
        - Household
      operationId: createHousehold
      summary: Bootstrap a household with its first owner (self-hosted first-run setup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdCreateRequest"
      responses:
        "201":
          description: Household created; returns an authenticated session for the new owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "409":
          $ref: "#/components/responses/Error"
  /spending:
    get:
      tags:
        - Household
      operationId: getSpendingByCategory
      summary: Spending by category for a month (defaults to the current month)
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: false
          description: "Month as YYYY-MM; omit for the current month."
          schema:
            type: string
      responses:
        "200":
          description: Spending by category for the month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingByCategory"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /household:
    get:
      tags:
        - Household
      operationId: getHouseholdContext
      summary: Get household financial context summary (current, or a past month's snapshot)
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: false
          description: "YYYY-MM; a past month returns its frozen snapshot. Omit for the live current month."
          schema:
            type: string
      responses:
        "200":
          description: Household context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdContext"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      tags:
        - Household
      operationId: updateHousehold
      summary: "Update household settings (M43: emergency-fund target)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdUpdateRequest"
      responses:
        "200":
          description: Updated household context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdContext"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /overview/cash-outlook:
    get:
      tags:
        - Household
      operationId: getCashOutlook
      summary: Projected cash over the next 30 days — paychecks in, payments out
      description: >-
        M112 (ADR 0026): the lived counterpart to safe-to-spend's zero-income
        stress test. Expected paydays (recurring-income detection) and every
        payment-timeline obligation, projected day by day, with the lowest point
        the balance reaches. Repeats the Bills due-vs-cash headline so the
        Overview and Bills screens say the same thing.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cash outlook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashOutlookResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /overview/spending-plan:
    get:
      tags:
        - Household
      operationId: getSpendingPlan
      summary: Left to spend this month — income minus spent and committed
      description: >-
        M113 (ADR 0027): expected income (received + projected paydays) minus
        month-to-date spending, unpaid bills through month end, and the month's
        loan/lease payments. The accrual counterpart to the cash outlook.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Spending plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingPlanResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /household/members:
    get:
      tags:
        - Household
      operationId: listMembers
      summary: List household members
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Household members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Household
      operationId: createMember
      summary: Add a household member
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCreateRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /household/members/{user_id}:
    patch:
      tags:
        - Household
      operationId: updateMemberRole
      summary: Change a member's role
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberRoleUpdateRequest"
      responses:
        "200":
          description: Member role changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Household
      operationId: deleteMember
      summary: Remove a household member
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /household/invites:
    post:
      tags:
        - Household
      operationId: createInvite
      summary: Invite a new member — returns the one-time join link token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCreateRequest"
      responses:
        "201":
          description: Invite created; the token appears ONLY in this response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCreateResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Household
      operationId: listInvites
      summary: List invitations with their status (pending/accepted/expired/revoked)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /household/invites/{invite_id}/token:
    post:
      tags:
        - Household
      operationId: regenerateInviteToken
      summary: Mint a fresh link for an unaccepted invite (the old link stops working)
      security:
        - bearerAuth: []
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: New invite token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCreateResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /household/invites/{invite_id}:
    delete:
      tags:
        - Household
      operationId: revokeInvite
      summary: Revoke a pending invite (an accepted invite is history — remove the member instead)
      security:
        - bearerAuth: []
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Invite revoked
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /invites/preview:
    post:
      tags:
        - Household
      operationId: previewInvite
      summary: "Public: what an invite link joins (household, email, role)"
      description: >-
        The token is POSTed in the body (never a query param) so the secret
        stays out of access logs; the join page keeps it in the URL fragment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitePreviewRequest"
      responses:
        "200":
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitePreview"
        "404":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /invites/accept:
    post:
      tags:
        - Household
      operationId: acceptInvite
      summary: "Public: accept an invite — set your own password and join the household"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteAcceptRequest"
      responses:
        "201":
          description: Joined; signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /household/roles:
    get:
      tags:
        - Household
      operationId: listRoles
      summary: List the household's roles and the rights catalog
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Household
      operationId: createRole
      summary: Create a custom role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreateRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /household/roles/{role_id}:
    patch:
      tags:
        - Household
      operationId: updateRole
      summary: Update a custom role
      security:
        - bearerAuth: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Household
      operationId: deleteRole
      summary: Delete an unused custom role
      security:
        - bearerAuth: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /audit:
    get:
      tags:
        - Audit
      operationId: listAuditEvents
      summary: List the household's audit events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /audit/{audit_id}/undo:
    post:
      tags:
        - Audit
      operationId: undoAuditEvent
      summary: Reverse a previously-recorded action
      security:
        - bearerAuth: []
      parameters:
        - name: audit_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The updated audit event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /accounts:
    get:
      tags:
        - Accounts
      operationId: listAccounts
      summary: List accounts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Accounts
      operationId: createAccount
      summary: Create an account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreateRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /accounts/{account_id}:
    patch:
      tags:
        - Accounts
      operationId: updateAccount
      summary: Update an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdateRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Accounts
      operationId: deleteAccount
      summary: Delete an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /accounts/{account_id}/balances:
    post:
      tags:
        - Accounts
      operationId: recordAccountBalance
      summary: Record a new balance for an account
      security:
        - bearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountBalanceCreateRequest"
      responses:
        "201":
          description: Balance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /transactions:
    get:
      tags:
        - Transactions
      operationId: listTransactions
      summary: List transactions (recent, or every one in a given YYYY-MM month)
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: false
          description: "YYYY-MM; returns every transaction in that month. Omit for the recent set."
          schema:
            type: string
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Transactions
      operationId: createTransaction
      summary: Manually create a transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCreateRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /transactions/review:
    get:
      tags:
        - Transactions
      operationId: listTransactionsForReview
      summary: Transactions to review — duplicates, transfers, credits, or suspected income
      security:
        - bearerAuth: []
      parameters:
        - name: kind
          in: query
          required: false
          description: "duplicates (default) | transfers | credits | suspected_income"
          schema:
            type: string
            enum: [duplicates, transfers, credits, suspected_income]
      responses:
        "200":
          description: Transactions to review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "422":

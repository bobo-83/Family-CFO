          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Money:
      type: object
      required:
        - amount_minor
        - currency
      properties:
        amount_minor:
          type: integer
          format: int64
          description: Signed integer amount in minor currency units.
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
    PairingSession:
      type: object
      required:
        - id
        - qr_payload
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        qr_payload:
          type: string
        expires_at:
          type: string
          format: date-time
    PairingConfirmRequest:
      type: object
      required:
        - pairing_session_id
        - device_name
        - device_public_key
      properties:
        pairing_session_id:
          type: string
          format: uuid
        device_name:
          type: string
          minLength: 1
          maxLength: 120
        device_public_key:
          type: string
          minLength: 1
    DeviceCredential:
      type: object
      required:
        - device_id
        - access_token
        - expires_at
      properties:
        device_id:
          type: string
          format: uuid
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
    PairedDevice:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type:
            - string
            - "null"
          format: date-time
        revoked_at:
          type:
            - string
            - "null"
          format: date-time
    PairedDeviceListResponse:
      type: object
      required:
        - devices
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/PairedDevice"
    AuthSessionCreateRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    AuthSession:
      type: object
      required:
        - access_token
        - expires_at
        - household_id
        - user_id
        - role
      properties:
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        household_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/HouseholdRole"
    HouseholdRole:
      type: string
      enum:
        - owner
        - adult
        - viewer
        - child
    RecurringFrequency:
      type: string
      enum:
        - weekly
        - biweekly
        - semimonthly
        - monthly
        - quarterly
        - annual
    Transaction:
      type: object
      required:
        - id
        - account_id
        - occurred_at
        - amount
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Money"
        merchant:
          type: string
        category:
          type: string
        description:
          type: string
    Bill:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
        next_due_date:
          type: string
          format: date
        account_id:
          type: string
          format: uuid
    IncomeSource:
      type: object
      required:
        - id
        - name
        - amount
        - frequency
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
        frequency:
          $ref: "#/components/schemas/RecurringFrequency"
    AccountListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    TransactionListResponse:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
    BillListResponse:
      type: object
      required:
        - bills
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
    IncomeListResponse:
      type: object
      required:
        - income
      properties:
        income:
          type: array
          items:
            $ref: "#/components/schemas/IncomeSource"
    GoalListResponse:
      type: object
      required:
        - goals
      properties:
        goals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"
    HouseholdContext:
      type: object
      required:
        - household_id
        - display_name
        - currency
        - net_worth
        - emergency_fund_months
      properties:
        household_id:
          type: string
          format: uuid
        display_name:
          type: string
        currency:
          type: string
          example: USD
        net_worth:
          $ref: "#/components/schemas/Money"
        emergency_fund_months:
          type: number
          format: double
    Account:
      type: object
      required:
        - id
        - name
        - type
        - balance
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        balance:
          $ref: "#/components/schemas/Money"
        annual_interest_rate:
          type: number
          minimum: 0
        minimum_payment:
          $ref: "#/components/schemas/Money"
        institution:
          type: string
          nullable: true
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        emergency_fund_percent:
          description: "M36: percent of this account's balance reserved for emergencies (exclusive with emergency_fund_amount)."
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        emergency_fund_amount:
          description: "M36: fixed amount of this account reserved for emergencies (exclusive with emergency_fund_percent)."
          $ref: "#/components/schemas/Money"
        emergency_fund_reserved:
          description: "M36: derived reservation — percent of the latest balance or the fixed amount, capped at the balance."
          $ref: "#/components/schemas/Money"
    AccountType:
      type: string
      enum:
        - checking
        - savings
        - credit_card
        - brokerage
        - retirement
        - hsa
        - "529"
        - mortgage
        - auto_loan
        - student_loan
        - real_estate
        - other_asset
        - other_liability
    Goal:
      type: object
      required:
        - id
        - name
        - type
        - target
        - current
        - priority
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/GoalType"
        target:
          $ref: "#/components/schemas/Money"
        current:
          $ref: "#/components/schemas/Money"
        target_date:
          type: string
          format: date
        priority:
          type: integer
          minimum: 1
          maximum: 5
    GoalCreateRequest:
      type: object
      required:
        - name
        - type
        - target
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/GoalType"
        target:
          $ref: "#/components/schemas/Money"
        target_date:
          type: string
          format: date
        priority:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
    GoalType:
      type: string
      enum:
        - emergency_fund
        - vacation
        - retirement
        - college
        - vehicle
        - renovation
        - other
    PurchaseAdvisorRequest:
      type: object
      required:
        - item
        - price
      properties:
        merchant:
          type: string
        item:
          type: string
        description:
          type: string
        price:
          $ref: "#/components/schemas/Money"
        source:
          type: string
          enum:
            - manual
            - mobile_vision
            - receipt
            - product_photo
        confidence:
          type: number
          minimum: 0
          maximum: 1
        user_question:
          type: string
    RetirementScenarioRequest:
      type: object
      required:
        - current_age
        - retirement_age
        - current_savings
        - monthly_contribution
        - annual_return_rate
      properties:
        current_age:
          type: integer
          minimum: 0
          maximum: 120
        retirement_age:
          type: integer
          minimum: 1
          maximum: 130
        current_savings:
          $ref: "#/components/schemas/Money"
        monthly_contribution:
          $ref: "#/components/schemas/Money"
        annual_return_rate:
          type: number
          minimum: 0
          maximum: 1
        annual_expenses:
          $ref: "#/components/schemas/Money"
    Recommendation:
      type: object
      required:
        - id
        - answer
        - assumptions
        - impacts
        - tradeoffs
        - alternatives
        - confidence
        - calculation_refs
      properties:
        id:
          type: string
          format: uuid
        answer:
          type: string
        assumptions:
          type: array
          items:
            type: string
        impacts:
          type: array
          items:
            $ref: "#/components/schemas/Impact"
        tradeoffs:
          type: array
          items:
            type: string
        alternatives:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        calculation_refs:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        answered_by:
          type: string
          nullable: true
          description: Model id that produced the answer; null for deterministic answers
        photo_described_by:
          type: string
          nullable: true
          description: Vision model that read an attached photo; null when none
    Impact:
      type: object
      required:
        - area
        - summary
      properties:
        area:
          type: string
          enum:
            - cash_flow
            - emergency_fund
            - debt
            - savings_goal
            - retirement
            - net_worth
            - other
        summary:
          type: string
        amount:
          $ref: "#/components/schemas/Money"
    ChatRequest:
      type: object
      required:
        - message
      properties:
        conversation_id:
          type: string
          format: uuid
        message:
          type: string
          minLength: 1
          maxLength: 4000
        image_base64:
          type: string
          description: Optional attached photo, base64-encoded (ADR 0011)
        image_media_type:
          type: string
          enum:
            - image/jpeg
            - image/png
            - image/webp
    ChatResponse:
      type: object
      required:
        - conversation_id
        - recommendation
      properties:
        conversation_id:
          type: string
          format: uuid
        recommendation:
          $ref: "#/components/schemas/Recommendation"
    ImportCreateRequest:
      type: object
      required:
        - source_type
        - filename
      properties:
        source_type:
          $ref: "#/components/schemas/ImportSourceType"
        filename:
          type: string
        account_id:
          type: string
          format: uuid
    ImportRecord:
      type: object
      required:
        - id
        - source_type
        - filename
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        source_type:
          $ref: "#/components/schemas/ImportSourceType"
        filename:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - needs_review
            - completed
            - discarded
            - failed
        error_message:
          type: string
        skipped_row_count:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
    ImportListResponse:
      type: object
      required:
        - imports
      properties:
        imports:
          type: array
          items:
            $ref: "#/components/schemas/ImportRecord"
    Document:
      type: object
